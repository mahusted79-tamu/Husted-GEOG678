
<!DOCTYPE html>
<html>
<head>
    <title>Matt Husted's First Web Map</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
     integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
     crossorigin=""/>
    
    <style>
        html, body {
            height: 100%;
            margin: 0;
        }
        #map {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
     integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
     crossorigin=""></script>
    <script>
        // Initialize the map
        var map = L.map('map').fitWorld();
        
        // Add OpenStreetMap tiles
        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>'
        }).addTo(map);
        
        // TAMU landmarks coordinates
        var kyleField = [30.6084, -96.3402];
        var omBuilding = [30.6179, -96.3386];
        var academicBuilding = [30.6159, -96.3413];
        
        // Try to locate the user
        map.locate({setView: true, maxZoom: 16});
        
        // Location found event handler
        function onLocationFound(e) {
            var radius = e.accuracy / 2;
            L.marker(e.latlng).addTo(map)
                .bindPopup("You are within " + radius + " meters from this point").openPopup();
            L.circle(e.latlng, radius).addTo(map);
        }
        
        // Location error event handler
        function onLocationError(e) {
            // If geolocation fails, center on Kyle Field
            map.setView(kyleField, 15);
            alert("Location access was denied or unavailable. Map centered on Kyle Field.");
        }
        
        // TODO: Create custom icons for O&M and Academic Building
        var BuildingIcon = L.Icon.extend({
            options: {
            shadowUrl: "bldg-shadow.png",
            iconSize: [50, 50],
            shadowSize: [75, 50],
            iconAnchor: [22, 94],
            shadowAnchor: [20, 95],
            popupAnchor: [-3, -76]
            }
        });

        var oandmBldgIcon = new BuildingIcon({ iconUrl: "bldg-omb.png" });
        var academicBldgIcon = new BuildingIcon({ iconUrl: "bldg-acad.png" });

        L.marker([30.6179, -96.3386], { icon: oandmBldgIcon })
            .addTo(map)
            .bindPopup("O&M Building");

        L.marker([30.6159, -96.3413], { icon: academicBldgIcon })
            .addTo(map)
            .bindPopup("Academic Building");
        
        // TODO: Create click event to show coordinates in popup
        function onMapClick(e) {
            L.popup()
                .setLatLng(e.latlng)
                .setContent(
                    "Clicked Coordinates: " +
                    "<br>Latitude: " + e.latlng.lat.toFixed(5) +
                    "<br>Longitude: " + e.latlng.lng.toFixed(5)
                )
                .openOn(map);
        }

        map.on('click', onMapClick);

        // TODO: Create a circle around Kyle Field with popup
        var circle = L.circle([30.6084, -96.3402], {
            color: 'red',
            fillColor: '#f03',
            fillOpacity: 0.5,
            radius: 500
        }).addTo(map);

        circle.bindPopup("Kyle Field.");
     
        // Register event handlers
        map.on('locationfound', onLocationFound);
        map.on('locationerror', onLocationError);
    </script>
</body>
</html>
