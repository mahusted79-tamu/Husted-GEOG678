<!DOCTYPE html>
<html>
  <head>
    <title>Tutorial 3</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" 
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin=""/>
    <!-- Make sure you put this AFTER Leaflet's CSS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin="">
    </script>
    <style>
        body {
            padding: 0;
            margin: 0;
        }
        html, body, #map {
            height: 100%;
            width: 100vw;
        }
    </style>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  </head>
  <body>
    <div id="map"></div>
    <script>
        var map = L.map("map").setView([51.505, -0.09], 13);

        L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
            maxZoom: 19,
            attribution: "© OpenStreetMap"
        }).addTo(map);

        var LeafIcon = L.Icon.extend({
            options: {
            shadowUrl: "leaf-shadow.png",
            iconSize: [38, 95],
            shadowSize: [50, 64],
            iconAnchor: [22, 94],
            shadowAnchor: [4, 62],
            popupAnchor: [-3, -76]
            }
        });

        var greenIcon = new LeafIcon({ iconUrl: "leaf-green.png" });
        var redIcon = new LeafIcon({ iconUrl: "leaf-red.png" });
        var orangeIcon = new LeafIcon({ iconUrl: "leaf-orange.png" });

        L.marker([51.5, -0.09], { icon: greenIcon })
            .addTo(map)
            .bindPopup("I am a green leaf.");

        L.marker([51.495, -0.083], { icon: redIcon })
            .addTo(map)
            .bindPopup("I am a red leaf.");

        L.marker([51.49, -0.1], { icon: orangeIcon })
            .addTo(map)
            .bindPopup("I am an orange leaf.");
    </script>
  </body>
</html>
