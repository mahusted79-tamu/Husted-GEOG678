<!DOCTYPE html>
<html>
  <head>
    <title>Matt Husted TAMU Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.3.1/dist/leaflet.css"
      integrity="sha512-Rksm5RenBEKSKFjgI3a41vrjkw4EVPlJ3+OiI65vTjIdo9brlAacEuKOiQ5OFh7cOI1bkDwLqdLw3Zg0cRJAAQ=="
      crossorigin=""/>

    <script src="https://unpkg.com/leaflet@1.3.1/dist/leaflet.js"
    integrity="sha512-/Nsx9X4HebavoBvEBuyp3I7od5tA0UzAxs+j83KgC8PU0kgB4XiK4Lfe4y4cgBtaRJQEIFCW+oC506aPT2L1zw=="
    crossorigin=""></script>

    <!-- <script src="sample-geojson.js" type="text/javascript"></script> -->

    <style>
      #mapid {
        height: 600px;
        width: 800px;
      }
      .info {
        padding: 6px 8px;
        font: 14px/16px Arial, Helvetica, sans-serif;
        background: white;
        background: rgba(255,255,255,0.8);
        box-shadow: 0 0 15px rgba(0,0,0,0.2);
        border-radius: 5px;
      }
      .info h4 {
        margin: 0 0 5px;
        color: #777;
      }
    </style>
  </head>
  <body>
    <h1>Matt Husted TAMU Map</h1>
    <div id="mapid"></div>

    <<script>
    var map = L.map('mapid').setView([39.75621, -104.99404], 13);

    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    var geojsonFeature = {
        "type": "Feature",
        "properties": {
        "name": "Coors Field",
        "amenity": "Baseball Stadium",
        "popupContent": "This is where the Rockies play!"
        },
        "geometry": {
        "type": "Point",
        "coordinates": [-104.99404, 39.75621]
        },

    };

    var geojsonMarkerOptions = {
        radius: 8,
        fillColor: "#ff7800",
        color: "#000",
        weight: 1,
        opacity: 1,
        fillOpacity: 0.8
    };

    function onEachFeature(feature, layer) {
        if (feature.properties && feature.properties.popupContent) {
        layer.bindPopup(feature.properties.popupContent);
        }
    }

    L.geoJSON(geojsonFeature, {
        pointToLayer: function(feature, latlng) {
        return L.circleMarker(latlng, geojsonMarkerOptions);
        },
        onEachFeature: onEachFeature
    }).addTo(map);

    var someFeatures = [{
        "type": "Feature",
        "properties": {
        "name": "Coors Field",
        "show_on_map": true,
        "popupContent": "This feature is visible because show_on_map is true."
        },
        "geometry": {
        "type": "Point",
        "coordinates": [-104.99404, 39.75621]
        }
    }, {
        "type": "Feature",
        "properties": {
        "name": "Busch Field",
        "show_on_map": false,
        "popupContent": "This feature is hidden because show_on_map is false."
        },
        "geometry": {
        "type": "Point",
        "coordinates": [-104.98404, 39.74621]
        }
    }];

    L.geoJSON(someFeatures, {
        filter: function(feature, layer) {
        return feature.properties.show_on_map;
        },
        onEachFeature: onEachFeature
    }).addTo(map);

    </script>
  </body>
</html>
