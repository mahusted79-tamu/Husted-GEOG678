<!DOCTYPE html>
<html>
  <head>
    <title>College Station Weekly Temperature Forecast</title>
     <script src="https://d3js.org/d3.v4.min.js"></script>
     <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            }

            h1 {
            text-align: left;
            font-family: Georgia, "Times New Roman", serif;
            font-weight: normal;
            margin-bottom: 10px;
            }

            .axis-label {
            font-size: 14px;
            font-weight: bold;
            }

            .legend {
            font-size: 14px;
            }
     </style>
  </head>
  <body>
     <h1>College Station Weekly Temperature Forecast</h1>

    <svg width="900" height="520"></svg>

    <script>
        const data = [
        { day: "Sat", high: 82, low: 67 },
        { day: "Sun", high: 81, low: 59 },
        { day: "Mon", high: 81, low: 50 },
        { day: "Tue", high: 70, low: 47 },
        { day: "Wed", high: 77, low: 51 },
        { day: "Thu", high: 78, low: 60 },
        { day: "Fri", high: 79, low: 66 },
        { day: "Sat", high: 80, low: 66 }
        ];

        const svg = d3.select("svg");
        const width = 900;
        const height = 520;
        const margin = { top: 30, right: 70, bottom: 90, left: 80 };

        const chartWidth = width - margin.left - margin.right;
        const chartHeight = height - margin.top - margin.bottom;

        const chart = svg.append("g")
        .attr("transform", `translate(${margin.left},${margin.top})`);

        const x = d3.scalePoint()
        .domain(data.map((d, i) => i))
        .range([0, chartWidth])
        .padding(0.5);

        const y = d3.scaleLinear()
        .domain([45, 85])
        .range([chartHeight, 0]);

        const lineHigh = d3.line()
        .x((d, i) => x(i))
        .y(d => y(d.high));

        const lineLow = d3.line()
        .x((d, i) => x(i))
        .y(d => y(d.low));

        // X axis
        chart.append("g")
        .attr("transform", `translate(0,${chartHeight})`)
        .call(d3.axisBottom(x).tickFormat(i => data[i].day));

        // Y axis
        chart.append("g")
        .call(d3.axisLeft(y));

        // Y axis label
        chart.append("text")
        .attr("class", "axis-label")
        .attr("transform", "rotate(-90)")
        .attr("x", -chartHeight / 2)
        .attr("y", -50)
        .attr("text-anchor", "middle")
        .text("Temperature (°F)");

        // Highest line
        chart.append("path")
        .datum(data)
        .attr("fill", "none")
        .attr("stroke", "red")
        .attr("stroke-width", 2)
        .attr("d", lineHigh);

        // Lowest line
        chart.append("path")
        .datum(data)
        .attr("fill", "none")
        .attr("stroke", "steelblue")
        .attr("stroke-width", 2)
        .attr("d", lineLow);

        // Highest dots
        chart.selectAll(".high-dot")
        .data(data)
        .enter()
        .append("circle")
        .attr("class", "high-dot")
        .attr("cx", (d, i) => x(i))
        .attr("cy", d => y(d.high))
        .attr("r", 4)
        .attr("fill", "red");

        // Lowest dots
        chart.selectAll(".low-dot")
        .data(data)
        .enter()
        .append("circle")
        .attr("class", "low-dot")
        .attr("cx", (d, i) => x(i))
        .attr("cy", d => y(d.low))
        .attr("r", 4)
        .attr("fill", "steelblue");

        // Legend
        const legend = chart.append("g")
        .attr("class", "legend")
        .attr("transform", `translate(${chartWidth / 2 - 90}, ${chartHeight + 55})`);

        legend.append("rect")
        .attr("x", 0)
        .attr("y", -10)
        .attr("width", 14)
        .attr("height", 14)
        .attr("fill", "red");

        legend.append("text")
        .attr("x", 22)
        .attr("y", 2)
        .text("Highest");

        legend.append("rect")
        .attr("x", 110)
        .attr("y", -10)
        .attr("width", 14)
        .attr("height", 14)
        .attr("fill", "steelblue");

        legend.append("text")
        .attr("x", 132)
        .attr("y", 2)
        .text("Lowest");
    </script>
  </body>
</html>
